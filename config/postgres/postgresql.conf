# CIVITAS — PostgreSQL tuning
# Ajuster selon la RAM disponible (paramètres pour 2GB RAM)

# Connexions
max_connections = 100

# Mémoire
shared_buffers            = 512MB    # 25% de la RAM
effective_cache_size      = 1536MB   # 75% de la RAM
work_mem                  = 16MB
maintenance_work_mem      = 128MB
wal_buffers               = 16MB

# Checkpoint
checkpoint_completion_target = 0.9
checkpoint_timeout           = 10min
max_wal_size                 = 2GB
min_wal_size                 = 1GB

# Planner
effective_io_concurrency    = 200
random_page_cost            = 1.1
default_statistics_target   = 100

# Logging
log_min_duration_statement  = 1000   # Log requêtes > 1s
log_line_prefix             = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints             = on
log_connections             = off
log_disconnections          = off
log_lock_waits              = on

# Extensions
shared_preload_libraries    = 'pg_stat_statements'
pg_stat_statements.max      = 10000
pg_stat_statements.track    = all

# pgvector specifics
max_parallel_workers_per_gather = 2
