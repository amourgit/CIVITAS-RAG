---
- name: Install PostgreSQL database server
  hosts: databases
  become: true
  vars:
    postgres_version: "14"
    postgres_db: "civitas_db"
    postgres_user: "civitas"
    postgres_password: "{{ vault_postgres_password }}"
  tasks:
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql-{{ postgres_version }}
          - postgresql-contrib
          - libpq-dev
          - python3-psycopg2
        state: present

    - name: Create database
      become_user: postgres
      postgresql_db:
        name: "{{ postgres_db }}"
        state: present

    - name: Create application user
      become_user: postgres
      postgresql_user:
        name: "{{ postgres_user }}"
        password: "{{ postgres_password }}"
        db: "{{ postgres_db }}"
        priv: ALL
