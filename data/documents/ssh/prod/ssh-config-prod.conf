# SSH Configuration — Production Environment
# CIVITAS Infrastructure

Host bastion-prod
    HostName 10.0.1.10
    User ubuntu
    IdentityFile ~/.ssh/civitas-prod.pem
    StrictHostKeyChecking yes
    ServerAliveInterval 60
    ServerAliveCountMax 3

Host app-prod-*
    User ubuntu
    IdentityFile ~/.ssh/civitas-prod.pem
    ProxyJump bastion-prod
    StrictHostKeyChecking yes

Host db-prod
    HostName 10.0.2.100
    User postgres
    IdentityFile ~/.ssh/civitas-prod.pem
    ProxyJump bastion-prod
    Port 22
    StrictHostKeyChecking yes
    # Database servers: disable agent forwarding
    ForwardAgent no
    ForwardX11 no
